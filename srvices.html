<!doctype html>
<html lang="ar">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Services Cube — MoCodex</title>
  <style>
    :root{
      --primary: #8e44ad; /* purple */
      --primary-deep: #732d91;
      --accent: #f39c12;  /* gold */
      --bg: #0f0f10;
      --card: rgba(255,255,255,0.04);
      --text: #eee;
      --muted: #cfc7e6;
      --cube-size: 220px; /* change size here */
      --transition: cubic-bezier(.22,.9,.3,1);
    }

    *{box-sizing:border-box}
    html,body{height:100%; margin:0; font-family:Inter, system-ui, Arial; background:linear-gradient(180deg,#0b0b0c,#151418); color:var(--text); -webkit-font-smoothing:antialiased;}

    /* الصفحة العامة */
    .services-section{
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:48px;
      padding:48px;
    }

    /* صندوق الوصف - أقصى اليسار */
    .desc {
      width: 380px;
      max-width: 36vw;
      min-width: 260px;
      background: linear-gradient(180deg, rgba(142,68,173,0.14), rgba(0,0,0,0.2));
      border: 1px solid rgba(142,68,173,0.12);
      padding: 22px;
      border-radius: 14px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.6);
      backdrop-filter: blur(6px) saturate(140%);
      transform-origin: left center;
    }

    .desc .title{
      font-size:1.15rem;
      font-weight:800;
      color:var(--primary);
      margin-bottom:8px;
      letter-spacing:0.02em;
    }

    .desc .text{
      color:var(--muted);
      line-height:1.6;
      font-weight:600;
      font-size:0.98rem;
      min-height:96px;
      opacity:0;
      transition: opacity 450ms var(--transition), transform 450ms var(--transition);
      transform: translateY(6px);
    }

    .desc.visible .text{
      opacity:1;
      transform: translateY(0);
    }

    /* الحاوية التي تحتوي على المكعب وإعداد المنظور */
    .cube-wrap{
      width: calc(var(--cube-size) * 1.2);
      height: calc(var(--cube-size) * 1.2);
      perspective: 1200px;
      display:flex;
      align-items:center;
      justify-content:center;
      position:relative;
    }

    /* صندوق الأرضية الخفية (للـ impact effect) */
    .ground {
      position:absolute;
      bottom:18%;
      width:60%;
      height:6px;
      background: linear-gradient(90deg, rgba(142,68,173,0.25), rgba(243,156,18,0.15));
      border-radius: 6px;
      filter: blur(8px);
      transform-origin:center;
      opacity:0; /* نبقيه مخفي ويظهر عند الصدمة */
      transition:opacity 220ms;
    }

    /* المكعب نفسه */
    .scene {
      width:var(--cube-size);
      height:var(--cube-size);
      transform-style: preserve-3d;
      transition: transform 1000ms var(--transition);
      will-change: transform;
    }

    .face {
      position:absolute;
      width:var(--cube-size);
      height:var(--cube-size);
      display:flex;
      align-items:center;
      justify-content:center;
      border-radius:12px;
      font-weight:800;
      font-size:1rem;
      color:#111;
      backface-visibility: hidden;
      box-shadow: 0 8px 30px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.02);
      transition: transform 550ms var(--transition), box-shadow 350ms;
    }

    /* تصميم الوجوه بألوان متدرجة */
    .face .label {
      text-align:center;
      padding:18px;
      color: var(--text);
      font-weight:800;
      letter-spacing:0.02em;
    }

    .face.front{ background: linear-gradient(180deg, var(--primary), var(--primary-deep)); color:white; }
    .face.back{ background: linear-gradient(180deg, #4b2a60,#2e1534); color:white; }
    .face.right{ background: linear-gradient(180deg, #f39c12, #c77805); color:#111; }
    .face.left{ background: linear-gradient(180deg, #2b2b2b, #161616); color:#ddd; }
    .face.top{ background: linear-gradient(180deg, #6f3aa3, #3a1f56); color:white; }
    .face.bottom{ background: linear-gradient(180deg, #222, #0f0f0f); color:#cfc7e6; }

    /* وضع الوجوه في المكعب */
    .face.front  { transform: rotateY(   0deg) translateZ(calc(var(--cube-size) / 2)); }
    .face.back   { transform: rotateY( 180deg) translateZ(calc(var(--cube-size) / 2)); }
    .face.right  { transform: rotateY(  90deg) translateZ(calc(var(--cube-size) / 2)); }
    .face.left   { transform: rotateY( -90deg) translateZ(calc(var(--cube-size) / 2)); }
    .face.top    { transform: rotateX(  90deg) translateZ(calc(var(--cube-size) / 2)); }
    .face.bottom { transform: rotateX( -90deg) translateZ(calc(var(--cube-size) / 2)); }

    /* تأثير الوجوه عند الظهور النشط (optional) */
    .face.showing{
      transform: scale(1.03);
      box-shadow: 0 24px 60px rgba(0,0,0,0.65);
    }

    /* حركة الدخول من اليمين وBounce */
    @keyframes enterFromRight {
      0%   { transform: translateX(120vw) translateY(-40vh) rotateZ(-8deg) scale(0.9); opacity:0; }
      55%  { transform: translateX(-6vw) translateY(12vh) rotateZ(4deg) scale(1.02); opacity:1; }
      75%  { transform: translateX(2vw) translateY(0vh) rotateZ(-2deg) scale(1); }
      100% { transform: translateX(0) translateY(0) rotateZ(0) scale(1); }
    }

    .enter {
      animation: enterFromRight 1.1s var(--transition) forwards;
    }

    /* floating / gentle bobbing */
    @keyframes floaty {
      0%   { transform: translateY(0)   rotateX(var(--rx,0deg)) rotateY(var(--ry,0deg)); }
      50%  { transform: translateY(-10px) rotateX(var(--rx,0deg)) rotateY(var(--ry,0deg)); }
      100% { transform: translateY(0)   rotateX(var(--rx,0deg)) rotateY(var(--ry,0deg)); }
    }
    .floating { animation: floaty 3.6s ease-in-out infinite; }

    /* استجابة */
    @media (max-width:900px){
      .services-section{ flex-direction:column-reverse; gap:18px; padding:32px; }
      .desc{ width:90%; max-width:640px; }
      .cube-wrap{ transform: scale(0.85); }
    }
  </style>
</head>
<body>

  <section class="services-section">
    <!-- DESCRIPTION on the left -->
    <div class="desc" aria-live="polite">
      <div class="title" id="svc-title">Logo Design</div>
      <div class="text" id="svc-text">
        Memorable, timeless logos that define your brand’s identity.
      </div>
    </div>

    <!-- CUBE on the right -->
    <div class="cube-wrap">
      <div class="ground" id="ground"></div>
      <div class="scene enter" id="cube">
        <div class="face front"  data-face="0"><div class="label">Logo Design</div></div>
        <div class="face right"  data-face="1"><div class="label">UI / UX Design</div></div>
        <div class="face back"   data-face="2"><div class="label">Brand Identity</div></div>
        <div class="face left"   data-face="3"><div class="label">Motion Graphics</div></div>
        <div class="face top"    data-face="4"><div class="label">Web Development</div></div>
        <div class="face bottom" data-face="5"><div class="label">Social Media</div></div>
      </div>
    </div>
  </section>

  <script>
    /***********************
      CONFIG
    ***********************/
    const CUBE = document.getElementById('cube');
    const GROUND = document.getElementById('ground');
    const SVC_TITLE = document.getElementById('svc-title');
    const SVC_TEXT = document.getElementById('svc-text');

    const CYCLE_INTERVAL = 4000; // ms per face
    const ROTATE_DURATION = 900; // matches CSS transition for scene
    const CUBE_SIZE = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--cube-size')) || 220;

    // services data (6 faces)
    const SERVICES = [
      {title: 'Logo Design', text: 'Memorable, timeless logos that define your brand’s identity.'},
      {title: 'UI / UX Design', text: 'Intuitive and elegant interfaces focused on user experience.'},
      {title: 'Brand Identity', text: 'Complete visual systems: palettes, typography, and guidelines.'},
      {title: 'Motion Graphics', text: 'Dynamic animations that bring brand stories to life.'},
      {title: 'Web Development', text: 'Responsive, fast websites tailored to your business.'},
      {title: 'Social Media', text: 'Eye-catching visuals optimized for social platforms.'}
    ];

    // rotation angles for each face to face the viewer
    // format: {rx, ry} in degrees
    const ROTATIONS = [
      {rx: 0,   ry: 0},    // front
      {rx: 0,   ry: -90},  // right
      {rx: 0,   ry: -180}, // back
      {rx: 0,   ry: -270}, // left (-270 is same as +90)
      {rx: 90,  ry: 0},    // top (rotateX positive moves top toward viewer)
      {rx: -90, ry: 0}     // bottom
    ];

    let currentIndex = 0;
    let intervalId = null;
    let isPaused = false;

    // helper: set cube transform to show given face index
    function showFace(index, jumpInstant=false){
      index = (index + SERVICES.length) % SERVICES.length;
      currentIndex = index;

      const {rx, ry} = ROTATIONS[index];
      // set CSS vars for floating to preserve current rotation
      CUBE.style.setProperty('--rx', rx + 'deg');
      CUBE.style.setProperty('--ry', ry + 'deg');

      // apply transform: translateZ to center, then rotateX/Y
      // we rotate around center: no translateZ needed because faces already offset
      // for nicer effect we add slight translateZ for perspective
      const tx = `rotateX(${rx}deg) rotateY(${ry}deg)`;
      if (jumpInstant) {
        // temporarily remove transition for instant set (used on init)
        CUBE.style.transition = 'none';
        CUBE.style.transform = tx;
        // force reflow then restore transition
        void CUBE.offsetWidth;
        CUBE.style.transition = 'transform 1000ms var(--transition)';
      } else {
        CUBE.style.transform = tx;
      }

      // highlight current face (apply .showing)
      document.querySelectorAll('.face').forEach(f => f.classList.remove('showing'));
      const faceEl = document.querySelector(`.face[data-face="${index}"]`);
      if (faceEl) faceEl.classList.add('showing');

      // update description with smooth fade
      document.querySelector('.desc').classList.remove('visible');
      setTimeout(()=>{
        SVC_TITLE.textContent = SERVICES[index].title;
        SVC_TEXT.textContent = SERVICES[index].text;
        document.querySelector('.desc').classList.add('visible');
      }, 260);
    }

    // cycle automatically
    function startCycle(){
      stopCycle();
      intervalId = setInterval(()=>{
        if (!isPaused) {
          showFace(currentIndex + 1);
        }
      }, CYCLE_INTERVAL);
    }
    function stopCycle(){ if(intervalId) { clearInterval(intervalId); intervalId = null; } }

    // initial sequence: play bounce / impact
    function playEntrySequence(){
      // show ground briefly at "impact" time
      setTimeout(()=> {
        GROUND.style.opacity = '1';
        GROUND.style.transform = 'scaleX(1.2)';
        setTimeout(()=> {
          GROUND.style.opacity = '0';
          GROUND.style.transform = 'scaleX(1)';
        }, 320);
      }, 520); // timed to align with enter animation

      // after enter animation ends, enable floating and start cycling
      const ENTRY_MS = 1100; // matches .enter animation duration
      setTimeout(()=>{
        CUBE.classList.remove('enter');
        CUBE.classList.add('floating');
        // initialize showing face 0
        showFace(0, true);
        startCycle();
      }, ENTRY_MS + 80);
    }

    // pause on hover to let user inspect
    const wrapper = document.querySelector('.cube-wrap');
    wrapper.addEventListener('mouseenter', ()=> { isPaused = true; CUBE.style.transition = 'transform 300ms var(--transition)'; });
    wrapper.addEventListener('mouseleave', ()=> { isPaused = false; CUBE.style.transition = 'transform 1000ms var(--transition)'; });

    // allow clicking faces to jump
    document.querySelectorAll('.face').forEach(face=>{
      face.addEventListener('click', (e)=>{
        const idx = parseInt(face.getAttribute('data-face'));
        showFace(idx);
      });
    });

    // resize handler to maintain perspective if needed
    window.addEventListener('resize', ()=> { /* currently not needed but placeholder */ });

    // start
    playEntrySequence();

  </script>
</body>
</html>
